<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SWAPI Pagination</title>
    <script src="index.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <header>
      <h1 class="text-3xl text-center font-bold bg-amber-200 py-3">
        Star Wars page swap
      </h1>
    </header>
    <div class="flex flex-row justify-around py-3 bg-black/40">
      <button
        class="bg-gray-300 p-3 rounded-3xl border-2 border-black hover:bg-gray-400 hover:border-white"
        id="prev"
      >
        Previous
      </button>
      <h2 class="text-2xl text-center font-bold" id="pageNum"></h2>
      <button
        class="bg-gray-300 p-3 rounded-3xl border-2 border-black hover:bg-gray-400 hover:border-white"
        id="next"
      >
        Next
      </button>
    </div>
    <div class="grid grid-cols-3 gap-2" id="output"></div>
  </body>
</html>
